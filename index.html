<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Logging System</title>
    <style>
        /* CSS Embedded inside HTML */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .logger-panel {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #38bdf8;
            margin-top: 0;
            font-size: 24px;
        }
        .trigger-section {
            margin-bottom: 25px;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-info { background-color: #38bdf8; color: #0f172a; }
        .btn-warn { background-color: #f59e0b; color: #0f172a; }
        .btn-error { background-color: #ef4444; color: white; }
        .btn-clear { background-color: #475569; color: white; }
        button:hover { opacity: 0.9; }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        h3 {
            margin: 0;
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .terminal-window {
            background-color: #030712;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 15px;
            height: 220px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            white-space: pre-wrap;
            margin-top: 10px;
        }
        /* Custom coloring for log outputs */
        .log-info { color: #38bdf8; }
        .log-warn { color: #fbbf24; }
        .log-error { color: #f87171; }
        .log-system { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

    <div class="logger-panel">
        <h1>System Logger Dashboard</h1>
        <p>Simulate application events. The logger catches them, formats them, displays them, and persists them to LocalStorage.</p>

        <div class="trigger-section">
            <h3>Trigger Live Events</h3>
            <div class="btn-group">
                <button class="btn-info" id="infoBtn">Log Info Event</button>
                <button class="btn-warn" id="warnBtn">Log Warning Event</button>
                <button class="btn-error" id="errorBtn">Log Error Event</button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #334155;">

        <div class="terminal-header">
            <h3>Console Output Stream</h3>
            <button class="btn-clear" id="clearBtn" style="flex: none; padding: 5px 12px; font-size: 12px;">Clear Logs</button>
        </div>
        
        <div class="terminal-window" id="terminal"></div>
    </div>

    <script src="logger.js"></script>
</body>
</html>
